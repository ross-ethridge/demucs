default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host:     <%= ENV.fetch("DB_HOST",     "localhost") %>
  username: <%= ENV.fetch("DB_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DB_PASSWORD", "") %>

development:
  <<: *default
  database: demucs_development

test:
  <<: *default
  database: demucs_test

production:
  primary: &production_primary
    <<: *default
    database: demucs_production
  cache:
    <<: *production_primary
  queue:
    <<: *production_primary
  cable:
    <<: *production_primary

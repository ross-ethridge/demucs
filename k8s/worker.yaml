apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: demucs
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: worker
          image: demucs-web
          command: ["./bin/jobs"]
          env:
            - name: RAILS_ENV
              value: production
            - name: RAILS_LOG_TO_STDOUT
              value: "true"
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: demucs-secrets
                  key: SECRET_KEY_BASE
            - name: DB_HOST
              value: db
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: demucs-secrets
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: demucs-secrets
                  key: POSTGRES_PASSWORD
            - name: DEMUCS_ENDPOINT
              value: http://demucs:8080
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: demucs-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: demucs-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: demucs-secrets
                  key: AWS_REGION
            - name: AWS_BUCKET
              valueFrom:
                secretKeyRef:
                  name: demucs-secrets
                  key: AWS_BUCKET
            - name: S3_ENDPOINT
              value: http://minio.demucs-minio.svc.cluster.local
            - name: JOB_CONCURRENCY
              value: "2"
            - name: DEMUCS_SHIFTS
              value: "3"

apiVersion: apps/v1
kind: Deployment
metadata:
  name: demucs
  namespace: demucs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demucs
  template:
    metadata:
      labels:
        app: demucs
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: demucs
          image: ghcr.io/ross-ethridge/demucs:latest
          ports:
            - containerPort: 8080
          env:
            - name: S3_ENDPOINT
              value: http://minio:9000
            - name: OMP_NUM_THREADS
              value: "6"
            - name: MKL_NUM_THREADS
              value: "6"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: demucs-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: demucs-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: demucs-secrets
                  key: AWS_REGION
          resources:
            requests:
              cpu: "5"
              memory: "8Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: demucs
  namespace: demucs
spec:
  selector:
    app: demucs
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP

# Fill in all CHANGE_ME values before applying.
# Apply with: kubectl apply -f k8s/secrets.yaml
#
# To base64-encode a value: echo -n 'myvalue' | base64
#
# Alternatively, create the secret imperatively and skip this file:
#   kubectl -n demucs create secret generic demucs-secrets \
#     --from-env-file=.env
apiVersion: v1
kind: Secret
metadata:
  name: demucs-secrets
  namespace: demucs
type: Opaque
stringData:
  POSTGRES_USER: "demucs"
  POSTGRES_PASSWORD: "CHANGE_ME"
  AWS_ACCESS_KEY_ID: "CHANGE_ME"
  AWS_SECRET_ACCESS_KEY: "CHANGE_ME"
  AWS_REGION: "us-east-1"
  AWS_BUCKET: "CHANGE_ME"
  SECRET_KEY_BASE: "CHANGE_ME"
  TLS_DOMAIN: "CHANGE_ME"
